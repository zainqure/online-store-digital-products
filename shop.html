<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="#" class="logo">LOGO</a>
        <nav>
            <a href="index.html">Home</a>
            <a href="shop.html" class="active">Shop</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>
    <h2 class="section-title shop-page-only">Our Products</h2>
    <section class="products">
        <div class="product">
            <img src="image/Gratitude Journal - 01.jpg" alt="">
            <h2>Gratitude Journal</h2>
            <p>Write your daily thoughts and feel better.</p>
            <button>Buy Now</button>
        </div>

        <div class="product">
            <img src="image/Emotional Dump Journal - 01.jpg" alt="">
            <h2>Emotional Dump Journal</h2>
            <p>Release your stress and organize your feelings.</p>
            <button>Buy Now</button>
        </div>

        <div class="product">
            <img src="image/Study Planner - 01.jpg" alt="">
            <h2>Study Planner</h2>
            <p>Plan your study time and stay organized.</p>
            <button>Buy Now</button>
        </div>
    </section>

    <footer>
        <p>© 2026 Zainab Qureshi</p>
        <div class="right">
            <a href="#" class="footer-text">Contact</a>
            <a href="#" class="footer-text">Privacy</a>
            <img class="moon" src="image/img1.jpg" alt="">
            <img class="sun" src="image/img2.jpg" alt="">
            <div id="toggleMode" class="mode-btn">
                <div class="mode-inner"></div>
            </div>
        </div>
    </footer>
    

    <script>
        const toggleBtn = document.getElementById("toggleMode");

        toggleBtn.addEventListener("click", () => {
            document.body.classList.toggle("light-mode");
        });
    </script>
</body>
</html>
