<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <title>Online Store for Digital Products</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html">Home</a>
            <a href="#">Shop</a>
            <a href="about.html">About</a>
            <a href="#">Contact</a>
        </nav>
        <br>
        <h1>My Digital Product Store</h1>
        <p>Simple and useful digital products for you</p>

        <button id="toggleMode">Switch Mode</button>
    </header>

    <section class="products">

        <div class="product">
            <h2>Gratitude Journal</h2>
            <p>Write your daily thoughts and feel better.</p>
            <button>Buy Now</button>
        </div>

        <div class="product">
            <h2>Emotional Dump Journal</h2>
            <p>Release your stress and organize your feelings.</p>
            <button>Buy Now</button>
        </div>

        <div class="product">
            <h2>Study Planner</h2>
            <p>Plan your study time and stay organized.</p>
            <button>Buy Now</button>
        </div>

    </section>

    <script>
        const toggleBtn = document.getElementById("toggleMode");

        toggleBtn.addEventListener("click", () => {
            document.body.classList.toggle("light-mode");
        });
    </script>

</body>
</html>
