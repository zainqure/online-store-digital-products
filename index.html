<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <title>Online Store for Digital Products</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="#" class="logo">LOGO</a>
        <nav>
            <a href="index.html" class="active">Home</a>
            <a href="shop.html">Shop</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <button id="toggleMode">Switch Mode</button>
        </nav>
    </header>
    <section class="home">
        <section class="products">
            <div class="product">
                <h2>Gratitude Journal</h2>
                <p>Write your daily thoughts and feel better.</p>
                <button>Buy Now</button>
            </div>

            <div class="product">
                <h2>Emotional Dump Journal</h2>
                <p>Release your stress and organize your feelings.</p>
                <button>Buy Now</button>
            </div>

            <div class="product">
                <h2>Study Planner</h2>
                <p>Plan your study time and stay organized.</p>
                <button>Buy Now</button>
            </div>
        </section>
    </section>
    

    <script>
        const toggleBtn = document.getElementById("toggleMode");

        toggleBtn.addEventListener("click", () => {
            document.body.classList.toggle("light-mode");
        });
    </script>

</body>
</html>
